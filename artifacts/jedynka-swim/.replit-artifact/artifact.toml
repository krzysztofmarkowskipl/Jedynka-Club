kind = "web"
previewPath = "/"
title = "Klub Pływacki Jedynka"
version = "1.0.0"
id = "artifacts/jedynka-swim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19021

[services.development]
run = "pnpm --filter @workspace/jedynka-swim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jedynka-swim", "run", "build" ]
publicDir = "artifacts/jedynka-swim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19021"
BASE_PATH = "/"
